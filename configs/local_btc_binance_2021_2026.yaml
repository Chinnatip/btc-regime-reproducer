dataset:
  source_path: ${BTC_BINANCE_SOURCE_PATH}
  source_format: parquet
  timestamp_column: ts
  timestamp_unit:
  open_column: open
  high_column: high
  low_column: low
  close_column: close
  volume_column: volume
  symbol: BTCUSDT
  symbol_alias: BTC/USD
  market_type: binance_futures
  source_name: local_dqs_dataset
  resample_rule: 5min
  start_utc: 2021-01-01T00:00:00Z
  end_utc: 2026-04-03T00:00:00Z
  short_gap_fill_limit_bars: 3
  gap_fill_method: forward_fill
  alternate_gap_fill_method: time_interpolation
  outlier_zscore_threshold: 4.0
  outlier_reference: log_return
  paper_dataset_match: false

experiment:
  output_root: ${BTC_REGIME_OUTPUT_ROOT}
  volatility_window: 20
  volatility_window_candidates: [10, 20, 30]
  elbow_train_stride: 1
  kmeans_train_stride: 1
  hmm_train_stride: 1
  k_values: [2, 3, 4, 5, 6]
  main_k: 3
  n_states: 3
  covariance_type: diag
  max_iterations: 300
  random_seed: 42
  plot_start_utc:
  plot_end_utc:
  plot_max_points: 25000
